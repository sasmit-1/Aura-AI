<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI — Sign In</title>
    <meta name="description" content="Sign in to Aura AI. Access the Climate Capital Operating System as a Founder or Investor.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        aura: {
                            black: '#000000',
                            surface: '#0a0a0a',
                            card: '#111111',
                            border: '#1a1a1a',
                            dim: '#333333',
                            muted: '#737373',
                            green: '#00ff88',
                            'green-dim': '#00cc6a',
                            cyan: '#00d4ff',
                            amber: '#ffb800',
                            red: '#ff3b5c',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #000; }

        /* Subtle background glow */
        .auth-glow {
            background:
                radial-gradient(ellipse 50% 40% at 50% 30%, rgba(0,255,136,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 70% 70%, rgba(0,212,255,0.03) 0%, transparent 50%);
        }

        /* Grid background */
        .grid-bg {
            background-image:
                linear-gradient(rgba(0,255,136,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.015) 1px, transparent 1px);
            background-size: 80px 80px;
        }

        /* Tab active states */
        .tab-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn.active-founder {
            background: rgba(0,255,136,0.1);
            border-color: rgba(0,255,136,0.4);
            color: #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.1);
        }
        .tab-btn.active-investor {
            background: rgba(0,212,255,0.1);
            border-color: rgba(0,212,255,0.4);
            color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.1);
        }

        /* Card glow */
        .auth-card {
            box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 40px rgba(0,255,136,0.03);
            transition: box-shadow 0.5s ease;
        }
        .auth-card.mode-investor {
            box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 40px rgba(0,212,255,0.04);
        }

        /* Submit button dynamic color */
        .submit-btn-founder {
            background: #00ff88;
            color: #000;
        }
        .submit-btn-founder:hover {
            background: #00cc6a;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .submit-btn-investor {
            background: #00d4ff;
            color: #000;
        }
        .submit-btn-investor:hover {
            background: #00b8d9;
            box-shadow: 0 0 30px rgba(0,212,255,0.3);
        }

        /* Fade in */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.6s ease-out forwards; }
        .fade-up-delay { animation: fadeUp 0.6s ease-out 0.15s forwards; opacity: 0; }

        /* Input focus style */
        input:focus {
            border-color: rgba(0,255,136,0.4) !important;
            box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
        }
        .mode-investor input:focus {
            border-color: rgba(0,212,255,0.4) !important;
            box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
        }
    </style>
</head>
<body class="bg-black text-white font-sans min-h-screen antialiased auth-glow grid-bg">

    <!-- Nav -->
    <nav class="fixed top-0 w-full z-50 bg-black/70 backdrop-blur-xl border-b border-aura-border">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/landing.html" class="flex items-center gap-3 group">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-aura-green/20 to-aura-cyan/20 border border-aura-green/30 flex items-center justify-center">
                    <span class="text-aura-green font-bold text-sm">A</span>
                </div>
                <span class="text-white font-semibold tracking-tight">Aura <span class="text-aura-muted font-normal">AI</span></span>
            </a>
            <a href="/landing.html" class="text-sm text-aura-muted hover:text-white transition-colors">← Back to Home</a>
        </div>
    </nav>

    <!-- Auth Card -->
    <main class="min-h-screen flex items-center justify-center px-6 pt-16">
        <div class="w-full max-w-md">

            <!-- Header -->
            <div class="text-center mb-8 fade-up">
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-aura-green/8 border border-aura-green/20 text-aura-green text-xs font-medium mb-5">
                    <span class="w-1.5 h-1.5 rounded-full bg-aura-green animate-pulse"></span>
                    SECURE ACCESS
                </div>
                <h1 class="text-3xl font-bold tracking-tight mb-2">Welcome to Aura AI</h1>
                <p class="text-aura-muted text-sm">Sign in to access the Climate Capital Operating System</p>
            </div>

            <!-- Card -->
            <div id="auth-card" class="auth-card bg-aura-card border border-aura-border rounded-2xl p-8 fade-up-delay">

                <!-- Role Tabs -->
                <div class="flex gap-3 mb-8">
                    <button id="tab-founder" type="button"
                        class="tab-btn flex-1 py-3 px-4 rounded-xl border border-aura-border text-sm font-medium text-aura-muted flex items-center justify-center gap-2 hover:text-white"
                        onclick="setRole('founder')">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        Founder
                    </button>
                    <button id="tab-investor" type="button"
                        class="tab-btn flex-1 py-3 px-4 rounded-xl border border-aura-border text-sm font-medium text-aura-muted flex items-center justify-center gap-2 hover:text-white"
                        onclick="setRole('investor')">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                        </svg>
                        Investor
                    </button>
                </div>

                <!-- Form -->
                <form id="auth-form" class="space-y-5">
                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-aura-muted mb-2">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@company.com" required
                            class="w-full px-4 py-3 bg-aura-surface border border-aura-border rounded-xl text-white placeholder-aura-dim focus:outline-none transition-all">
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-aura-muted mb-2">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                            class="w-full px-4 py-3 bg-aura-surface border border-aura-border rounded-xl text-white placeholder-aura-dim focus:outline-none transition-all">
                    </div>

                    <!-- Submit -->
                    <button type="submit" id="submit-btn"
                        class="w-full py-4 font-semibold rounded-xl transition-all duration-300 text-sm submit-btn-founder">
                        Sign In as Founder
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-4 my-6">
                    <div class="flex-1 h-px bg-aura-border"></div>
                    <span class="text-aura-dim text-xs">or</span>
                    <div class="flex-1 h-px bg-aura-border"></div>
                </div>

                <!-- Demo Access -->
                <button type="button" id="demo-btn" onclick="demoLogin()"
                    class="w-full py-3 bg-aura-surface border border-aura-border rounded-xl text-aura-muted text-sm font-medium hover:border-aura-green/30 hover:text-white transition-all">
                    🚀 Skip to Demo
                </button>

                <!-- Footer text -->
                <p class="text-center text-aura-dim text-xs mt-6">
                    By signing in you agree to our Terms of Service.
                    <br>This is a hackathon demo — no real authentication.
                </p>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-aura-border py-8 mt-12">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <p class="text-aura-dim text-sm">© 2026 Aura AI — Climate Capital Operating System</p>
            <p class="text-aura-dim text-xs font-mono">v0.1.0</p>
        </div>
    </footer>

    <script>
        // ── State ──
        let currentRole = "founder";

        // ── Read role from URL query param ──
        const params = new URLSearchParams(window.location.search);
        const urlRole = params.get("role");
        if (urlRole === "investor" || urlRole === "founder") {
            currentRole = urlRole;
        }

        // ── DOM refs ──
        const tabFounder = document.getElementById("tab-founder");
        const tabInvestor = document.getElementById("tab-investor");
        const submitBtn = document.getElementById("submit-btn");
        const authCard = document.getElementById("auth-card");
        const authForm = document.getElementById("auth-form");

        // ── Set active role ──
        function setRole(role) {
            currentRole = role;
            updateUI();
        }

        function updateUI() {
            // Reset both tabs
            tabFounder.className = "tab-btn flex-1 py-3 px-4 rounded-xl border border-aura-border text-sm font-medium text-aura-muted flex items-center justify-center gap-2 hover:text-white";
            tabInvestor.className = "tab-btn flex-1 py-3 px-4 rounded-xl border border-aura-border text-sm font-medium text-aura-muted flex items-center justify-center gap-2 hover:text-white";

            if (currentRole === "founder") {
                tabFounder.classList.add("active-founder");
                submitBtn.textContent = "Sign In as Founder";
                submitBtn.className = "w-full py-4 font-semibold rounded-xl transition-all duration-300 text-sm submit-btn-founder";
                authCard.classList.remove("mode-investor");
            } else {
                tabInvestor.classList.add("active-investor");
                submitBtn.textContent = "Sign In as Investor";
                submitBtn.className = "w-full py-4 font-semibold rounded-xl transition-all duration-300 text-sm submit-btn-investor";
                authCard.classList.add("mode-investor");
            }
        }

        // ── Form submission — redirect based on role ──
        authForm.addEventListener("submit", (e) => {
            e.preventDefault();

            // Animate button
            submitBtn.disabled = true;
            submitBtn.textContent = "Authenticating...";
            submitBtn.style.opacity = "0.6";

            setTimeout(() => {
                if (currentRole === "founder") {
                    window.location.href = "/founder.html";
                } else {
                    window.location.href = "/index.html";
                }
            }, 800);
        });

        // ── Demo login — skip straight in ──
        function demoLogin() {
            const demoBtn = document.getElementById("demo-btn");
            demoBtn.textContent = "Launching demo...";
            demoBtn.disabled = true;

            setTimeout(() => {
                if (currentRole === "founder") {
                    window.location.href = "/founder.html";
                } else {
                    window.location.href = "/index.html";
                }
            }, 600);
        }

        // ── Init ──
        updateUI();
    </script>

</body>
</html>
